spring.application.name=alert-service
server.port = 8084

#Kafka - consumer
#Kafka - consumer
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=alert-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=alertingEvent:com.homewatt.kafka.event.AlertingEvent

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/homewatt_db
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=none


# Mailpit SMTP Configuration
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Actuator & Prometheus (scraped by Prometheus in docker-compose)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

